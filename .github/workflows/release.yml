name: 🚀 Release Workflow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (X.Y.Z format)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - alpha
          - beta

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Fix 1 — Résoudre version ET release_type selon le déclencheur
      - name: Resolve version and release type
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Déclenché par un tag : extraire la version depuis le tag
            RAW_TAG="${{ github.ref_name }}"         # ex: v1.0.1-alpha
            VERSION="${RAW_TAG#v}"                    # ex: 1.0.1-alpha
            
            # Détecter le release type depuis le suffixe du tag
            if [[ "$VERSION" == *"-alpha" ]]; then
              RELEASE_TYPE="alpha"
              VERSION="${VERSION%-alpha}"
            elif [[ "$VERSION" == *"-beta" ]]; then
              RELEASE_TYPE="beta"
              VERSION="${VERSION%-beta}"
            else
              RELEASE_TYPE="stable"
            fi
          else
            # Déclenché manuellement via workflow_dispatch
            VERSION="${{ inputs.version }}"
            RELEASE_TYPE="${{ inputs.release_type }}"
          fi

          # Valider le format X.Y.Z
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: '$VERSION'"
            exit 1
          fi

          echo "✅ Version: $VERSION"
          echo "✅ Release type: $RELEASE_TYPE"

          # Exporter pour les étapes suivantes
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"

          # Ajouter à la fin du run, après les autres outputs
          if [ "$RELEASE_TYPE" != "stable" ]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils zip
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Update version in Cargo.toml
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" flux_compiler/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" flux_compiler/fluxc/Cargo.toml

      - name: Build Rust compiler
        run: |
          cd flux_compiler
          cargo build --release
          cp target/release/fluxc ../bin/fluxc

      - name: Build release package
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          chmod +x create_release.sh
          ./create_release.sh "$VERSION" ./releases

      - name: Generate release notes
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          RELEASE_TYPE="${{ steps.vars.outputs.release_type }}"
          DATE=$(date +%Y-%m-%d)

          # ✅ Fix 2 — Ne pas utiliser heredoc avec des variables GitHub Actions dedans
          # Les ${{ }} ne sont pas expandés dans un heredoc shell
          cat > "RELEASE_NOTES_v${VERSION}.md" << EOF
          # FluxSharp v${VERSION}

          **Release Type**: ${RELEASE_TYPE}
          **Release Date**: ${DATE}

          ## ✨ Features
          - New features and improvements

          ## 🐛 Bug Fixes
          - Bug fixes and patches

          ## 📋 Changelog
          See [CHANGELOG.md](./CHANGELOG.md) for detailed changes.

          ---
          **Installation**:
          \`\`\`bash
          tar -xzf fluxsharp-v${VERSION}-linux-x64.tar.gz
          cd fluxsharp-v${VERSION}-linux-x64
          ./build.sh examples/hello.fsh
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: FluxSharp v${{ steps.vars.outputs.version }} (${{ steps.vars.outputs.release_type }})
          body_path: RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          files: |
            releases/fluxsharp-v${{ steps.vars.outputs.version }}-linux-x64.tar.gz
            releases/fluxsharp-v${{ steps.vars.outputs.version }}-linux-x64.zip
            releases/fluxsharp-v${{ steps.vars.outputs.version }}-linux-x64-CHECKSUMS.txt
          prerelease: ${{ steps.vars.outputs.prerelease }}   # ← string "true"/"false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxsharp-release-${{ steps.vars.outputs.version }}
          path: releases/