name: 🚀 Release Workflow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (X.Y.Z format)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - alpha
          - beta

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and release type
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            RAW_TAG="${{ github.ref_name }}"
            VERSION="${RAW_TAG#v}"

            if [[ "$VERSION" == *"-alpha" ]]; then
              RELEASE_TYPE="alpha"
              VERSION="${VERSION%-alpha}"
            elif [[ "$VERSION" == *"-beta" ]]; then
              RELEASE_TYPE="beta"
              VERSION="${VERSION%-beta}"
            else
              RELEASE_TYPE="stable"
            fi
          else
            VERSION="${{ inputs.version }}"
            RELEASE_TYPE="${{ inputs.release_type }}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: '$VERSION'"
            exit 1
          fi

          echo "✅ Version: $VERSION"
          echo "✅ Release type: $RELEASE_TYPE"

          echo "version=$VERSION"               >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE"     >> "$GITHUB_OUTPUT"

          if [ "$RELEASE_TYPE" == "alpha" ]; then
            echo "tag=v${VERSION}-alpha"        >> "$GITHUB_OUTPUT"
          elif [ "$RELEASE_TYPE" == "beta" ]; then
            echo "tag=v${VERSION}-beta"         >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}"              >> "$GITHUB_OUTPUT"
          fi

          if [ "$RELEASE_TYPE" != "stable" ]; then
            echo "prerelease=true"              >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false"             >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils zip
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Rust compiler
        run: |
          cd flux_compiler
          cargo build --release
          echo "✅ Compiler built"

      - name: Prepare release_package
        run: |
          VERSION="${{ steps.vars.outputs.version }}"

          # 1. Copier le fluxc fraîchement compilé
          cp flux_compiler/target/release/fluxc release_package/bin/fluxc
          chmod +x release_package/bin/fluxc
          echo "✅ fluxc copied"

          # 2. Compiler le runtime.asm sur cette machine CI (pas de .o pré-compilé)
          nasm -f elf64 \
            -o release_package/lib/runtime.o \
            flux_compiler/fluxc/runtime/runtime.asm
          echo "✅ runtime.o compiled"

          # 3. Nettoyer les artefacts de build
          # Binaires compilés dans examples/ (garder uniquement les .fsh)
          find release_package/examples/ -type f ! -name "*.fsh" -delete
          echo "✅ Example binaries removed"

          # Fichiers .asm intermédiaires dans include/
          find release_package/include/ -name "*.asm" -delete
          echo "✅ Intermediate .asm files removed"

          # Tous les .gitignore
          find release_package/ -name ".gitignore" -delete
          echo "✅ .gitignore files removed"

          # 4. Vérifier le contenu final
          echo ""
          echo "📋 Final release_package contents:"
          find release_package/ -type f | sort

      - name: Create archives
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          RELEASE_NAME="fluxsharp-v${VERSION}-linux-x64"

          mkdir -p releases/

          # Créer le .tar.gz
          tar -czf "releases/${RELEASE_NAME}.tar.gz" \
            --transform "s|^release_package|${RELEASE_NAME}|" \
            release_package/
          echo "✅ ${RELEASE_NAME}.tar.gz ($(du -sh releases/${RELEASE_NAME}.tar.gz | cut -f1))"

          # Créer le .zip
          cp -r release_package /tmp/${RELEASE_NAME}
          cd /tmp && zip -qr "$GITHUB_WORKSPACE/releases/${RELEASE_NAME}.zip" "${RELEASE_NAME}/"
          rm -rf /tmp/${RELEASE_NAME}
          cd "$GITHUB_WORKSPACE"
          echo "✅ ${RELEASE_NAME}.zip ($(du -sh releases/${RELEASE_NAME}.zip | cut -f1))"

          # Générer les checksums
          cd releases/
          sha256sum "${RELEASE_NAME}.tar.gz" "${RELEASE_NAME}.zip" > "${RELEASE_NAME}-CHECKSUMS.txt"
          echo "✅ Checksums generated"
          cat "${RELEASE_NAME}-CHECKSUMS.txt"

      - name: Generate release notes
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          RELEASE_TYPE="${{ steps.vars.outputs.release_type }}"
          DATE=$(date +%Y-%m-%d)

          cat > "RELEASE_NOTES_v${VERSION}.md" << EOF
          # FluxSharp v${VERSION}

          **Release Type**: ${RELEASE_TYPE}
          **Release Date**: ${DATE}

          ## 📦 Package Contents

          \`\`\`
          fluxsharp-v${VERSION}-linux-x64/
          ├── bin/fluxc          ← Compiler
          ├── lib/runtime.o      ← Runtime (compiled for linux-x64)
          ├── include/core.fsh   ← Standard library
          ├── docs/              ← Documentation
          ├── examples/          ← Example .fsh files
          ├── build.sh           ← Build script
          ├── README.md
          └── INSTALL.md
          \`\`\`

          ## 🚀 Installation

          \`\`\`bash
          tar -xzf fluxsharp-v${VERSION}-linux-x64.tar.gz
          cd fluxsharp-v${VERSION}-linux-x64
          ./build.sh examples/hello.fsh
          \`\`\`

          ## 📋 Requirements
          - Linux x86_64
          - nasm
          - ld (binutils)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: FluxSharp v${{ steps.vars.outputs.version }} (${{ steps.vars.outputs.release_type }})
          body_path: RELEASE_NOTES_v${{ steps.vars.outputs.version }}.md
          files: |
            releases/fluxsharp-v${{ steps.vars.outputs.version }}-linux-x64.tar.gz
            releases/fluxsharp-v${{ steps.vars.outputs.version }}-linux-x64.zip
            releases/fluxsharp-v${{ steps.vars.outputs.version }}-linux-x64-CHECKSUMS.txt
          prerelease: ${{ steps.vars.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxsharp-release-${{ steps.vars.outputs.version }}
          path: releases/
